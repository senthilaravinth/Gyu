apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: student-attendance
  template:
    metadata:
      labels:
        app: student-attendance
    spec:
      containers:
      - name: student-app
        image: student-attendance-app:latest
        imagePullPolicy: Never # Crucial for local images (Minikube/Docker Desktop)
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: student-app-service
spec:
  type: NodePort
  selector:
    app: student-attendance
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30001